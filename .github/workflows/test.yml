name: Test formula

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Add Homebrew to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"
      - name: Register checkout as the gogainda/tap tap
        run: |
          tap_dir="$(brew --repository)/Library/Taps/gogainda/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap_dir"
      - run: brew install --build-from-source gogainda/tap/mdview-cli
      - run: brew test gogainda/tap/mdview-cli
